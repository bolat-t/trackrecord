<svg viewBox="0 0 1080 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowback" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="34" y="34" font-size="22" font-weight="700" fill="#111827">TrackRecord — Sydney transport reliability lakehouse</text>
  <text x="34" y="56" font-size="13" fill="#6b7280">TfNSW GTFS-Realtime → Databricks medallion (Delta + Unity Catalog) → MLflow + AI/BI</text>

  <!-- External (ingestion) panel -->
  <rect x="28" y="78" width="250" height="430" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="40" y="100" font-size="13" font-weight="700" fill="#334155">Your Mac + GitHub Actions</text>
  <text x="40" y="116" font-size="11" fill="#64748b">ingestion only — outside Databricks</text>

  <!-- Sources -->
  <rect x="46" y="128" width="214" height="108" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="150" font-size="13" font-weight="700" fill="#334155">Sources</text>
  <text x="58" y="172" font-size="11.5" fill="#475569">• TfNSW GTFS-RT — Sydney Trains (live)</text>
  <text x="58" y="194" font-size="11.5" fill="#475569">• TfNSW Historical — Metro + Ferry</text>
  <text x="58" y="216" font-size="11.5" fill="#475569">• BOM weather (Sydney)</text>

  <!-- Ingest -->
  <rect x="46" y="278" width="214" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="153" y="303" font-size="12.5" font-weight="700" fill="#3730a3" text-anchor="middle">Local ingest — Python + uv</text>
  <text x="153" y="321" font-size="11.5" fill="#4338ca" text-anchor="middle">parse protobuf → Parquet</text>

  <!-- Cron -->
  <rect x="46" y="372" width="214" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="153" y="394" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">GitHub Actions cron</text>
  <text x="153" y="411" font-size="11" fill="#64748b" text-anchor="middle">polls live feed → raw store</text>

  <!-- arrows in external panel -->
  <line x1="153" y1="236" x2="153" y2="276" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="153" y1="372" x2="153" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="160" y="360" font-size="10" fill="#64748b">schedules</text>

  <!-- Databricks panel -->
  <rect x="298" y="78" width="754" height="430" rx="10" fill="#fff8f7" stroke="#ff3621" stroke-width="1.8"/>
  <text x="312" y="100" font-size="13" font-weight="700" fill="#c81e0f">Databricks Free Edition · serverless</text>
  <text x="312" y="116" font-size="11" fill="#9a3a30">Unity Catalog — governance · lineage · Volumes</text>

  <!-- medallion + volume row -->
  <!-- Volume -->
  <rect x="314" y="150" width="118" height="72" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="373" y="182" font-size="12.5" font-weight="700" fill="#1e40af" text-anchor="middle">UC Volume</text>
  <text x="373" y="200" font-size="11" fill="#1d4ed8" text-anchor="middle">raw landing</text>
  <!-- Bronze -->
  <rect x="452" y="150" width="118" height="72" rx="8" fill="#f3e3d3" stroke="#b87333" stroke-width="1.5"/>
  <text x="511" y="182" font-size="12.5" font-weight="700" fill="#8a5a2b" text-anchor="middle">Bronze</text>
  <text x="511" y="200" font-size="10.5" fill="#8a5a2b" text-anchor="middle">raw GTFS + RT rows</text>
  <!-- Silver -->
  <rect x="590" y="150" width="118" height="72" rx="8" fill="#eceef1" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="649" y="178" font-size="12.5" font-weight="700" fill="#4b5563" text-anchor="middle">Silver</text>
  <text x="649" y="195" font-size="10.5" fill="#4b5563" text-anchor="middle">delay = actual−sched</text>
  <text x="649" y="209" font-size="10.5" fill="#4b5563" text-anchor="middle">+ weather</text>
  <!-- Gold -->
  <rect x="728" y="150" width="118" height="72" rx="8" fill="#f7eecb" stroke="#d4af37" stroke-width="1.5"/>
  <text x="787" y="178" font-size="12.5" font-weight="700" fill="#9a7d1a" text-anchor="middle">Gold</text>
  <text x="787" y="195" font-size="10.5" fill="#9a7d1a" text-anchor="middle">OTP · features</text>
  <text x="787" y="209" font-size="10.5" fill="#9a7d1a" text-anchor="middle">· predictions</text>

  <!-- Serve: AI/BI + MLflow -->
  <rect x="876" y="128" width="162" height="58" rx="8" fill="#e0f2fe" stroke="#0e7490" stroke-width="1.5"/>
  <text x="957" y="152" font-size="12" font-weight="700" fill="#0e6079" text-anchor="middle">AI/BI Dashboard</text>
  <text x="957" y="169" font-size="10.5" fill="#0e7490" text-anchor="middle">worst lines &amp; times</text>
  <rect x="876" y="200" width="162" height="58" rx="8" fill="#e6f4fb" stroke="#0194e2" stroke-width="1.5"/>
  <text x="957" y="224" font-size="12" font-weight="700" fill="#0a6aa1" text-anchor="middle">MLflow model</text>
  <text x="957" y="241" font-size="10.5" fill="#0a6aa1" text-anchor="middle">&gt;5-min-late · batch score</text>

  <!-- flow arrows -->
  <path d="M262,300 C290,300 300,200 312,188" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="250" font-size="10" fill="#64748b">upload (CLI/API)</text>
  <line x1="432" y1="186" x2="450" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="186" x2="588" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="708" y1="186" x2="726" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="846" y1="172" x2="874" y2="158" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="846" y1="200" x2="874" y2="222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- predictions written back to gold -->
  <path d="M876,236 C862,236 858,224 848,214" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrowback)"/>

  <!-- medallion colour strip -->
  <rect x="452" y="230" width="118" height="7" rx="3" fill="#b87333"/>
  <rect x="590" y="230" width="118" height="7" rx="3" fill="#9ca3af"/>
  <rect x="728" y="230" width="118" height="7" rx="3" fill="#d4af37"/>

  <!-- Workflows band -->
  <rect x="314" y="300" width="532" height="46" rx="8" fill="#ffe9e6" stroke="#ff3621" stroke-width="1.5"/>
  <text x="580" y="328" font-size="12" font-weight="700" fill="#c81e0f" text-anchor="middle">Databricks Workflows — ingest → bronze → silver → gold → score</text>
  <line x1="373" y1="300" x2="373" y2="240" stroke="#ff3621" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="511" y1="300" x2="511" y2="240" stroke="#ff3621" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="649" y1="300" x2="649" y2="240" stroke="#ff3621" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="787" y1="300" x2="787" y2="240" stroke="#ff3621" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- footnote -->
  <text x="314" y="372" font-size="10.5" fill="#9a3a30">Free Edition restricts notebook egress → ingestion runs outside and uploads raw to the Volume.</text>
  <text x="314" y="388" font-size="10.5" fill="#9a3a30">Hybrid data: Metro+Ferry historical (instant) + Sydney Trains live capture (headline story).</text>
</svg>
